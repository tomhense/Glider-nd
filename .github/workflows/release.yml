name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Bootstrap workspace
        uses: ./.github/actions/bootstrap
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Read release metadata
        id: release-metadata
        shell: bash
        run: |
          version_line="$(grep '^version:' pubspec.yaml | head -n 1 | cut -d' ' -f2)"
          release_version="${version_line%%+*}"
          build_number="${version_line##*+}"
          echo "tag_name=v${release_version}" >> "$GITHUB_OUTPUT"
          echo "build_number=${build_number}" >> "$GITHUB_OUTPUT"
          echo "notes_path=fastlane/metadata/android/en-US/changelogs/${build_number}.txt" >> "$GITHUB_OUTPUT"
      - name: Get Android keystore
        id: android-keystore
        uses: timheuer/base64-to-file@v1
        with:
          fileName: keystore.jks
          encodedString: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      - name: Create key.properties
        uses: GuillaumeFalourd/write-java-properties-file@v1
        with:
          file_path: ./android/key.properties
          property: |
            storeFile
            storePassword
            keyPassword
            keyAlias
          value: |
            ${{ steps.android-keystore.outputs.filePath }}
            ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
            ${{ secrets.ANDROID_KEY_PASSWORD }}
            ${{ secrets.ANDROID_KEY_ALIAS }}
      - name: Build Android APK
        run: fvm flutter build apk
      - name: Build Android App Bundle
        run: fvm flutter build appbundle
      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag_name="${GITHUB_REF_NAME}"
          else
            tag_name="${{ steps.release-metadata.outputs.tag_name }}"
          fi

          gh release create "$tag_name" \
            --target "$GITHUB_SHA" \
            --title "$tag_name" \
            --notes-file "${{ steps.release-metadata.outputs.notes_path }}" \
            build/app/outputs/apk/release/app-release.apk
