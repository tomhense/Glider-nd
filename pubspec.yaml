name: glider
description: An opinionated Hacker News client.
version: 2.8.0+49
publish_to: none

environment:
  sdk: ">=3.3.0-0 <4.0.0"

dependencies:
  bloc: ^9.2.0
  bloc_presentation: ^1.1.2
  clock: ^1.1.1
  collection: any
  device_info_plus: ^12.3.0
  dynamic_color: ^1.7.0
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_adaptive_scaffold: ^0.1.10+1
  flutter_bloc: ^9.1.1
  flutter_displaymode: ^0.7.0
  flutter_inappwebview: ^6.1.0
  flutter_localizations:
    sdk: flutter
  flutter_markdown_plus: ^1.0.7
  flutter_secure_storage: ^10.0.0
  formz: ^0.8.0
  glider_data:
    path: packages/glider_data
  glider_domain:
    path: packages/glider_domain
  go_router: ^17.1.0
  google_fonts: ^8.0.0
  http: ^1.2.1
  hydrated_bloc: ^10.1.1
  intl: any
  markdown: ^7.2.2
  material_color_utilities: any
  package_info_plus: ^9.0.0
  path_provider: ^2.1.5
  pub_semver: ^2.1.4
  relative_time: ^5.0.0
  rxdart: ^0.28.0
  share_plus: ^12.0.1
  shared_preferences: ^2.2.2
  sliver_tools: ^0.2.12
  super_sliver_list: ^0.4.1
  url_launcher: ^6.2.5

dev_dependencies:
  custom_lint: ^0.8.1
  dependency_validator: ^3.2.3
  flutter_launcher_icons: ^0.14.4
  leancode_lint: ^19.0.1
  melos: ^5.3.0

flutter:
  generate: true
  uses-material-design: true
  fonts:
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
    - family: NotoSansMono
      fonts:
        - asset: assets/fonts/NotoSansMono-Regular.ttf
